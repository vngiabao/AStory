<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <link rel="stylesheet" th:href="@{/css/login-style.css}" />
</head>

<body>
  <div class="container d-flex justify-content-center">
    <div class="login-container px-4">
      <div class="text-center mb-4">
        <div style="
              width: 80px;
              height: 80px;
              background: #fff9ed;
              border-radius: 20px;
              margin: 0 auto;
            "></div>
      </div>

      <h2 class="welcome-text text-center">Welcome Back</h2>
      <p class="sub-text text-center mb-5">
        Please enter your details to sign in.
      </p>

      <div th:if="${param.error}" class="alert alert-danger border-0 small">
        User name or Password incorrect!
      </div>

      <form method="post" th:action="@{/login}">
        <div class="mb-4">
          <label class="form-label">User name</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fa-regular fa-envelope text-muted"></i></span>
            <input type="text" name="username" class="form-control" placeholder="User name" required />
          </div>
        </div>

        <div class="mb-2">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" id="password" name="password" class="form-control"
              placeholder="Create a strong password" required
              style="border-left: 1px solid #dee2e6; border-right: none" />
            <span class="input-group-text" style="
                  border-left: none;
                  border-radius: 0 15px 15px 0;
                  cursor: pointer;
                ">
              <i class="fa-regular fa-eye-slash text-muted" id="togglePassword"></i>
            </span>
          </div>
        </div>

        <div class="text-end mb-5">
          <a href="#" class="forgot-link small">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-login w-100 shadow-sm">
          LOGIN
        </button>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      </form>

      <!-- <div class="social-section">
        <div class="divider">
          <span>Or continue with</span>
        </div> -->

      <!-- <div class="social-icons d-flex justify-content-between">
            <button class="btn">
              <img
                th:src="@{/images/google_logo.png}"
                alt="Google"
                width="30"
              />
            </button>

            <button class="btn">
              <img th:src="@{/images/facebook.png}" alt="Facebook" width="30" />
            </button>

            <button class="btn">
              <img th:src="@{/images/apple_logo.png}" alt="Apple" width="30" />
            </button>
          </div> -->

      <!-- <p class="mt-5 text-muted small">
            Don't have an account?
            <a href="#" class="forgot-link">Create Account</a>
          </p> -->
    </div>
  </div>
  </div>

  <script>
    // Script đơn giản để ẩn hiện mật khẩu
    const togglePassword = document.querySelector("#togglePassword");
    const password = document.querySelector("#password");

    togglePassword.addEventListener("click", function () {
      const type =
        password.getAttribute("type") === "password" ? "text" : "password";
      password.setAttribute("type", type);
      this.classList.toggle("fa-eye");
      this.classList.toggle("fa-eye-slash");
    });
  </script>
</body>

</html>
