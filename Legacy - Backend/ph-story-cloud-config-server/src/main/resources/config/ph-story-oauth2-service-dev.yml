server:
  port: 9084
  error: 
    include-message: always
    include-binding-errors: always

# Application name
spring: 
  application: 
    name: ph-story-oauth2-service
  jpa: 
    open-in-view: false
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate: 
      ddl-auto: none
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/astory_db
    username: postgres
    password: 123
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 50000 #maximum number of milliseconds that a client will wait for a connection
      minimum-idle: 2 # minimum number of idle connections maintained by HikariCP in a connection pool
      pool-name: user_manager_oauth_conn_pool
      maximum-pool-size: 4 # maximum pool size
      idle-timeout: 300000 # maximum idle time for connection
      max-lifetime: 900000 # maximum lifetime in milliseconds of a connection in the pool after it is closed.
      auto-commit: true # default auto-commit behavior.
      data-source-properties: 
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false
eureka: 
  client: 
    service-url: 
      defaultZone: http://localhost:9761/eureka
    registry-fetch-interval-seconds: 2
  instance: 
    instance-id: ${spring.application.name}:${instanceId:${random.value}}
    lease-expiration-duration-in-seconds: 6
    lease-renewal-interval-in-seconds: 3

#logging.level.org.springframework: ERROR
logging:
  level:
    org:
      springframework:
        security: INFO
        web: INFO

# hystrix
management.endpoints.web.exposure.include: hystrix.stream,info,health
hystrix.command.fallbackcmd.execution.isolation.thread.timeoutInMilliseconds: 10000
feign.circuitbreaker.enabled: true

security:
  jwt:
    audience: cds-system
  login:
    max-attempts: 5
    lock-duration-minutes: 15

app:
  cors:
    allowedOrigins: ["http://localhost:*"]
  security:
    issuer: http://localhost:9084

    clients:
      m2m:
        access-token-minutes: 45 # Đối với m2m mặc định khoảng 30 phút
        client-id: postman-client
        client-secret: secret
        scopes:
          - read

      spa:
        access-token-minutes: 15 # Đối với spa mặc định khoảng 15 phút
        client-id: spa-client
        redirect-uri: http://localhost:3000/callback
        logout-redirect-uri: http://localhost:3000

      mobile:
        access-token-minutes: 30 # Đối với mobile mặc định khoảng 15 phút
        refresh-token-days: 7 # Tuỳ mức bảo mật (Cao: 7 ngày, Bình thường: 14-30 ngày, Consumer app: 30 - 90 ngày)
        client-id: mobile-client
        client-secret: mobile-secret
        redirect-uri: com.myapp.mobile://callback