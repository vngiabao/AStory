server:
  port: 9082
# Application name
spring:
  application:
    name: ph-story-api-gateway
  # Spring cloud gateway config
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - https://app.lifetella.com # TODO: Change here
              - https://admin.mycompany.com # TODO: Change here
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - Authorization
              - Content-Type
              - Cache-Control
              - Last-Event-ID
            allowCredentials: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://auth.lifetella.com # TODO: Change here
          jwk-set-uri: http://ph-story-oauth2-service.lifetella:9084/oauth2/jwks
          audiences: cds-system

# Eureka config
eureka:
  client:
    service-url:
      defaultZone: http://ph-story-discovery-server:9761/eureka
    registry:
      registry-fetch-interval-seconds: 2
  instance:
    # When the lease expires, the default service expiration time is 90 seconds.
    # If the service does not heartbeat after 90 seconds, eureka server will remove the service from the list.
    # It's changed to 6 seconds
    lease-expiration-duration-in-seconds: 6
    # The lease renewal interval is 30 seconds by default, which is changed to 3 seconds here
    lease-renewal-interval-in-seconds: 3

logging:
  level:
    org.springframework.cloud.gateway: WARN
